<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      padding: 2rem;
      width: 100%;
      max-width: 600px;
    }
    h1 { text-align: center; margin-bottom: 0.5rem; color: #2563eb; }
    p.subtitle { text-align: center; color: #666; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.9rem; }
    input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { outline: none; border-color: #2563eb; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    button:hover { background: #1d4ed8; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button.secondary { background: #64748b; }
    button.secondary:hover { background: #475569; }
    .result { margin-top: 1.5rem; padding: 1rem; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
    .result a { color: #2563eb; word-break: break-all; }
    .error { color: #dc2626; margin-top: 0.5rem; font-size: 0.9rem; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.5rem; }
    .stat-item { background: white; padding: 0.5rem; border-radius: 6px; border: 1px solid #e2e8f0; text-align: center; }
    .stat-item .label { font-size: 0.75rem; color: #666; }
    .stat-item .value { font-size: 1.1rem; font-weight: 700; color: #2563eb; }
    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .actions button { flex: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>URL Shortener</h1>
    <p class="subtitle">Create short, shareable links</p>

    <div class="form-group">
      <label for="urlInput">Enter your long URL</label>
      <input type="text" id="urlInput" placeholder="https://example.com/very/long/url" />
    </div>
    <button id="shortenBtn">Shorten</button>
    <div id="error" class="error"></div>

    <div id="result" class="result" style="display:none;">
      <div class="stats">
        <div class="stat-item">
          <div class="label">Short URL</div>
          <div class="value"><a id="shortUrl" href="#" target="_blank">-</a></div>
        </div>
        <div class="stat-item">
          <div class="label">Access Count</div>
          <div class="value" id="accessCount">0</div>
        </div>
      </div>
      <div class="actions">
        <button id="statsBtn" class="secondary">Stats</button>
        <button id="deleteBtn" class="danger">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let currentShortCode = null;

    document.getElementById('shortenBtn').addEventListener('click', async () => {
      const url = document.getElementById('urlInput').value.trim();
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';

      if (!url) {
        errorEl.textContent = 'Please enter a URL';
        return;
      }

      try {
        const res = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        if (!res.ok) {
          const data = await res.json();
          errorEl.textContent = data.errors ? data.errors.join(', ') : 'Failed to create short URL';
          return;
        }

        const data = await res.json();
        currentShortCode = data.shortCode;
        displayResult(data);
      } catch (err) {
        errorEl.textContent = 'Network error';
      }
    });

    function displayResult(data) {
      const resultEl = document.getElementById('result');
      resultEl.style.display = 'block';

      const shortUrl = `${window.location.origin}/${data.shortCode}`;
      document.getElementById('shortUrl').href = shortUrl;
      document.getElementById('shortUrl').textContent = shortUrl;
      document.getElementById('accessCount').textContent = data.accessCount || 0;
    }

    document.getElementById('statsBtn').addEventListener('click', async () => {
      if (!currentShortCode) return;
      try {
        const res = await fetch(`/shorten/${currentShortCode}/stats`);
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById('accessCount').textContent = data.accessCount;
      } catch (err) {}
    });

    document.getElementById('deleteBtn').addEventListener('click', async () => {
      if (!currentShortCode) return;
      if (!confirm('Delete this short URL?')) return;

      try {
        const res = await fetch(`/shorten/${currentShortCode}`, { method: 'DELETE' });
        if (res.status === 204) {
          document.getElementById('result').style.display = 'none';
          document.getElementById('urlInput').value = '';
          currentShortCode = null;
        }
      } catch (err) {}
    });
  </script>
</body>
</html>
